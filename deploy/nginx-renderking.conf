# Nginx reverse proxy for Render King
# Install: sudo cp deploy/nginx-renderking.conf /etc/nginx/sites-available/renderking.au
# Enable:  sudo ln -sf /etc/nginx/sites-available/renderking.au /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d renderking.au -d www.renderking.au

server {
    listen 80;
    listen [::]:80;
    server_name renderking.au www.renderking.au;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
